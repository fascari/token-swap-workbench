openapi: 3.0.3
info:
  title: Token Transaction Workbench API
  version: 0.1.0
  description: HTTP API exposed by the Go workbench in front of the Rust chain service.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
servers:
  - url: http://127.0.0.1:8080
paths:
  /health:
    get:
      summary: Service health check
      operationId: getHealth
      responses:
        "200":
          description: Service is running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
              example:
                status: ok
  /v1/chain/status:
    get:
      summary: Check upstream chain availability
      operationId: getChainStatus
      responses:
        "200":
          description: Rust chain service responded successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
              example:
                status: ok
        "502":
          description: Upstream chain service error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/quote:
    get:
      summary: Get a token swap quote
      operationId: getQuote
      parameters:
        - name: in
          in: query
          required: true
          schema:
            type: string
          description: Input token symbol
          example: NEX
        - name: out
          in: query
          required: true
          schema:
            type: string
          description: Output token symbol
          example: ETH
        - name: amount
          in: query
          required: true
          schema:
            type: number
            format: double
            exclusiveMinimum: 0
          description: Input token amount
          example: 10
      responses:
        "200":
          description: Quote returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteResponse"
              example:
                amount_out: 9.900990099009901
        "400":
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Upstream chain service error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/transactions:
    post:
      summary: Submit a token transaction
      operationId: submitTransaction
      description: >
        Generic public transaction endpoint. The current UI sends a swap-shaped
        transaction payload, and the Go API forwards it to the Rust chain as a
        `Swap` envelope through upstream `POST /transaction`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionRequest"
            example:
              account_id: 2
              in_token: NEX
              out_token: ETH
              amount_in: 10
      responses:
        "202":
          description: Transaction accepted by the upstream service
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
              example:
                status: submitted
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Upstream chain service error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/bots:
    post:
      summary: Control randomized chain bots
      operationId: runBots
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BotRequest"
            examples:
              create:
                value:
                  action: create
                  amount: 10
              stop:
                value:
                  action: stop
                  amount: 5
                  all: false
              stop_all:
                value:
                  action: stop
                  all: true
      responses:
        "202":
          description: Bot command accepted by the workbench API
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotResponse"
              example:
                status: running
                action: create
                requested_amount: 10
                all: false
                active_bots: 10
                created_bots: 10
                stopped_bots: 0
                attempted_operations: 0
                accepted_operations: 0
                failed_operations: 0
                send_operations: 0
                swap_operations: 0
        "400":
          description: Invalid bot command
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Bot manager error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/blocks:
    get:
      summary: Fetch recent blocks
      operationId: getBlocks
      parameters:
        - name: n
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
          description: Number of recent blocks to fetch
          example: 5
      responses:
        "200":
          description: Recent blocks returned successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Block"
              example:
                - id: 605
                  timestamp: 1782827305
                  transactions:
                    - Swap:
                        account: 2
                        in_token: NEX
                        out_token: ETH
                        amount_in: 10
                        amount_out: 9.706853038245
                - id: 606
                  timestamp: 1782827306
                  transactions: []
        "400":
          description: Invalid query parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Upstream chain service error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    StatusResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: ok
    QuoteResponse:
      type: object
      required:
        - amount_out
      properties:
        amount_out:
          type: number
          format: double
          example: 9.900990099009901
    TransactionRequest:
      type: object
      description: >
        Public transaction payload currently used for swap submissions. The
        endpoint remains generic so other transaction kinds can be added
        without creating operation-specific public routes.
      required:
        - account_id
        - in_token
        - out_token
        - amount_in
      properties:
        account_id:
          type: integer
          minimum: 1
          example: 2
        in_token:
          type: string
          example: NEX
        out_token:
          type: string
          example: ETH
        amount_in:
          type: number
          format: double
          exclusiveMinimum: 0
          example: 10
    BotRequest:
      type: object
      required:
        - action
      properties:
        action:
          type: string
          enum:
            - create
            - stop
          example: create
        amount:
          type: integer
          minimum: 1
          maximum: 100
          description: Required for create and quantity-based stop commands. Ignored when all is true.
          example: 10
        all:
          type: boolean
          description: Stops every active bot when action is stop.
          default: false
          example: false
    BotResponse:
      type: object
      required:
        - status
        - action
        - requested_amount
        - all
        - active_bots
        - created_bots
        - stopped_bots
        - attempted_operations
        - accepted_operations
        - failed_operations
        - send_operations
        - swap_operations
      properties:
        status:
          type: string
          example: running
        action:
          type: string
          example: create
        requested_amount:
          type: integer
          example: 10
        all:
          type: boolean
          example: false
        active_bots:
          type: integer
          example: 10
        created_bots:
          type: integer
          example: 10
        stopped_bots:
          type: integer
          example: 0
        attempted_operations:
          type: integer
          example: 0
        accepted_operations:
          type: integer
          example: 0
        failed_operations:
          type: integer
          example: 0
        send_operations:
          type: integer
          example: 0
        swap_operations:
          type: integer
          example: 0
    Block:
      type: object
      required:
        - id
        - timestamp
        - transactions
      properties:
        id:
          type: integer
          example: 605
        timestamp:
          type: integer
          format: int64
          example: 1782827305
        transactions:
          type: array
          description: >
            Upstream Rust transaction envelopes are returned as-is. The current
            runtime uses externally tagged objects such as {"Swap": {...}}.
          items:
            $ref: "#/components/schemas/TransactionEnvelope"
    TransactionEnvelope:
      type: object
      additionalProperties: true
      example:
        Swap:
          account: 2
          in_token: NEX
          out_token: ETH
          amount_in: 10
          amount_out: 9.706853038245
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          example: BAD_REQUEST
        message:
          type: string
          example: in is required
