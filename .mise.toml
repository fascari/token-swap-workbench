[tools]
go = "1.26.1"
node = "22.23.0"

[env]
GOWORK = "off"
_.file = ".env"

[tasks.test]
description = "Run unit tests"
run = "go test -v ./..."

[tasks.integration]
description = "Run deterministic integration tests"
run = "go test -tags=integration ./internal/testing/integration/..."

[tasks.lint]
description = "Run linter"
run = "golangci-lint run"

[tasks.build]
description = "Build the Go API binary into build/token-swap-workbench-api"
run = "mkdir -p build && go build -o build/token-swap-workbench-api ./cmd/api"

[tasks."frontend:install"]
description = "Install frontend dependencies"
run = "npm install"

[tasks."frontend:dev"]
description = "Run the Vite frontend dev server"
run = "npm run dev"

[tasks."frontend:build"]
description = "Build the React frontend into web/static"
run = "npm run build"

[tasks.fmt]
description = "Format code"
run = "go fmt ./..."

[tasks.run]
description = "Run the service"
run = "npm run build && go run ./cmd/api"

[tasks.mocks]
description = "Generate mocks"
run = "mockery"
