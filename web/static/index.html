<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Token Swap Workbench</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <div class="masthead">
          <div>
            <p class="eyebrow">Local simulator</p>
            <h1>Token Swap Workbench</h1>
          </div>
          <span class="status" id="health-status">Starting</span>
        </div>

        <div class="grid">
          <label>
            Account
            <input value="2" inputmode="numeric" disabled />
          </label>
          <label>
            From
            <select disabled>
              <option>NEX</option>
              <option>USDC</option>
              <option>ETH</option>
            </select>
          </label>
          <label>
            To
            <select disabled>
              <option>ETH</option>
              <option>USDT</option>
              <option>BTC</option>
            </select>
          </label>
          <label>
            Amount
            <input value="10" inputmode="decimal" disabled />
          </label>
        </div>

        <div class="quote">
          <span>Quote</span>
          <strong>Pending chain client</strong>
        </div>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
